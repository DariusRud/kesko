<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSL ir KSD IT sistemų grupavimas</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Ikons (SVG formatu, kad nereikėtų išorinių bibliotekų)
        const Icon = ({ name, className }) => {
            const icons = {
                truck: <path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2m15-5V8a2 2 0 0 0-2-2h-3v10m4 0h2a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1h-2m-11 3a3 3 0 1 0 6 0 3 3 0 0 0-6 0m11 0a3 3 0 1 0 6 0 3 3 0 0 0-6 0" />,
                shopping: <path d="m5 11 4-7m10 7-4-7m-9 7h14m-12 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m10 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m-12-6 1.5 12h11l1.5-12" />,
                database: <path d="M12 22s8-2 8-10V6l-8-4-8 4v6c0 8 8 10 8 10" />,
                wallet: <path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1" />,
                globe: <React.Fragment><circle cx="12" cy="12" r="10" /><path d="M12 2a14.5 14.5 0 0 0 0 20M2 12h20" /></React.Fragment>,
                package: <path d="M16.5 9.4 7.5 4.21M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" />,
                list: <path d="M16 6h2a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h2M9 3h6a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1" />,
                layout: <React.Fragment><rect width="18" height="18" x="3" y="3" rx="2" /><path d="M3 9h18M9 21V9" /></React.Fragment>,
                zap: <path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z" />,
                layers: <path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.1 6.27a1 1 0 0 0 0 1.83l9.07 4.09a2 2 0 0 0 1.66 0l9.07-4.09a1 1 0 0 0 0-1.83ZM2.1 12.07l9.07 4.09a2 2 0 0 0 1.66 0l9.07-4.09M2.1 16.07l9.07 4.09a2 2 0 0 0-1.66 0l9.07-4.09" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [activeEntity, setActiveEntity] = useState('KSL');

            const kslInventory = [
                {
                    domain: "IT SUPPLYCHAIN (Tiekimas)",
                    color: "bg-blue-600",
                    icon: "truck",
                    subdomains: [
                        { name: "Prekių kortelės (normatyvai)", systems: ["AX Prekių kortelės", "Instrukcijų sistema", "Prekių ženklinimo lipdukų sistema", "AX sertifikatai", "Sertifikatų programa", "AX Atlas", "Aikido integracija"] },
                        { name: "Asortimento valdymas", systems: ["AVS"] },
                        { name: "Tiekėjai, sutartys", systems: ["AX Tiekėjų kortelės", "AX Tiekėjų sutarčių valdymas", "SSK: Tiekimo sutarčių sąlygų sekimo ir nuolaidų kontrolės programa"] },
                        { name: "Prekių tiekimas", systems: ["Cross-docking", "KANBAN", "AX Pirkimų užsakymai", "AX Perkėlimo užsakymai", "Tiekimo ataskaitos"] },
                        { name: "Prekių tiekimas (kokybės valdymas)", systems: ["AX garantinio sistema", "Garantinio sistema (GRP)", "Pažeidimų sistema", "Pretenzijų sistema"] },
                        { name: "Atsargų valdymas", systems: ["AX Atsargų valdymas", "AX Atsargų inventorizacija", "Gamyba (fasavimas)", "GPAIS", "Sen2004 Sezoniniai požymiai"] }
                    ]
                },
                {
                    domain: "LOGISTIKA (Transportas & Sandėliai)",
                    color: "bg-indigo-600",
                    icon: "package",
                    subdomains: [
                        { name: "Sandėlių valdymas", systems: ["Sandėlių valdymo sistemos (SVS JDA)", "3PL SVS ir integracijos", "Aikštelių valdymo sistema (AVP)", "Krovinių valdymo sistema (KVP)", "AX Krovinių valdymo sistema", "Kiemo valdymo sistema (Fleet Complet)"] },
                        { name: "Logistika (transportas)", systems: ["Transporto maršrutizavimo sistema (TMS)", "Transporto valdymo sistema (Logixis)", "TSVS konkursavimo programa", "DPD lipdukų spausdinimo aplikacija", "KSL Kurjerių valdymo sistema", "IVAZ"] }
                    ]
                },
                {
                    domain: "IT HOSALES (B2B & Pardavimai)",
                    color: "bg-green-600",
                    icon: "shopping",
                    subdomains: [
                        { name: "Klientai, sutartys, kreditai", systems: ["AX Klientų kortelės", "AX Klientų sutartys", "AX Klientų kreditai"] },
                        { name: "B2B pardavimai - urmas", systems: ["AX Pardavimų modulis", "AX Tiesioginis pristatymas", "ESF (Elektroninių sąskaitų faktūrų) programa", "Komercinių pasiūlymų sistema (KOMPAS)", "EDI Pardavimai", "CRM", "Spec. užsakymai", "SABIS", "CommerceAPI"] },
                        { name: "Pardavimai franšizėms", systems: ["FP Rivilė", "PUPI (prekių užsakymas per internetą) programa", "Firminių prekių užsakymų valdymo programa (FPAU)"] },
                        { name: "Pardavimai Eshop / LV / EE", systems: ["AX Pardavimų modulis (Eshop)", "Integracija su KSD www.e-senukai.lt", "AX Pardavimų modulis (LV/EE)"] },
                        { name: "Kainodara / Akcijos / Lojalumas", systems: ["AX LT Pardavimų kainodaros valdymas", "AX Akcijų valdymas", "AX Pardavimų grąžinimai", "Rivilė: Lojalumo modulis", "AX Lojalumo modulis", "Dovanų kortelės"] }
                    ]
                },
                {
                    domain: "IT SHOP (Mažmena & POS)",
                    color: "bg-orange-600",
                    icon: "globe",
                    subdomains: [
                        { name: "Pardavimai mažmenoje (POS)", systems: ["RASO POS", "FP Rivilės POS"] },
                        { name: "Mažmenos valdymas", systems: ["DUV", "Mažmenos darbo grafikai (WORKOFO)", "Kainoženklių programa", "Lentynų valdymo sistema (Spaceman)"] },
                        { name: "Paslaugos klientams", systems: ["Prekės informacija", "Įrankių nuomos sistema", "Gamyba (sveriamos prekės)", "Lizingas", "Trečių šalių paslaugų apskaita per POS", "ESF savitarnos terminalas MP"] }
                    ]
                },
                {
                    domain: "IT SUPPORT (Finansai & HR)",
                    color: "bg-slate-700",
                    icon: "wallet",
                    subdomains: [
                        { name: "Finansai & Apskaita", systems: ["AX Finansai", "Rivilė: Biudžetų valdymo modulis", "AX Finansinės dimensijos", "PPO (periodo pabaigos operacijos)", "FA Finansinių duomenų analitika", "AX Ilgalaikis turtas", "AX Mokėjimai (Bankai, Tiekėjai, Klientai)", "Parama", "Trečių šalių turto apskaita", "Intrastat / PVM / ISAF", "Skolos, sudengimai, kredito limitų sutartys", "Akredityvai, forward'ai, valiutų valdymas", "Bank Gateways"] },
                        { name: "Personalo valdymas & HR", systems: ["Kadrai", "Rivilė: Algų valdymo modulis", "Atrankų valdymo sistema (TeamTailor, SPAIS)", "Moodle (integracija)", "Darbuotojų prašymų lapeliai", "Kadrų sinchronizacija su AD"] },
                        { name: "Analitika & Palaikymas", systems: ["BI, OLAP Cube", "Qlik Sense (BI)", "Graf10 programa", "TIAK (Turto inventorizacija)", "Prek_obj_new ataskaita", "Dokumentų valdymo sistema (DVS) DocLogix", "Paslaugų tarnyba iTOP", "Korporatyvinė svetainė", "Intranetas", "Kesko integracija (LV/EE)"] }
                    ]
                }
            ];

            const ksdInventory = [
                {
                    domain: "KSD STOREFRONT",
                    color: "bg-cyan-600",
                    icon: "layout",
                    subdomains: [
                        { name: "E-commerce platforma", systems: ["Next.js Web Platform", "Mobile App (iOS/Android)", "Contentful (CMS)"] },
                        { name: "Analitika & Track'ing", systems: ["Google Tag Manager", "Hotjar / Analytics"] }
                    ]
                },
                {
                    domain: "KSD DIGITAL CORE",
                    color: "bg-purple-600",
                    icon: "zap",
                    subdomains: [
                        { name: "Microservices", systems: ["Product API", "Checkout API", "User / Profile API", "Search Service (Algolia)", "Pricing & Promo Service"] }
                    ]
                },
                {
                    domain: "KSD PIM & DATA",
                    color: "bg-pink-600",
                    icon: "layers",
                    subdomains: [
                        { name: "Produktų valdymas", systems: ["PIM (Product Info Management)", "DAM (Digital Assets)", "Akeneo", "Translation Service"] }
                    ]
                }
            ];

            const currentInventory = activeEntity === 'KSL' ? kslInventory : ksdInventory;

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto">
                        <header className="mb-8 bg-white p-2 rounded-2xl shadow-sm border border-slate-200 flex flex-wrap items-center justify-between">
                            <div className="flex gap-2">
                                {['KSL', 'KSD', 'KSLV', 'KSEE'].map(entity => (
                                    <button
                                        key={entity}
                                        onClick={() => setActiveEntity(entity)}
                                        className={`px-6 py-2.5 rounded-xl font-black text-sm transition-all ${
                                            activeEntity === entity 
                                            ? 'bg-blue-600 text-white shadow-md shadow-blue-200' 
                                            : 'text-slate-400 hover:bg-slate-100'
                                        }`}
                                    >
                                        {entity}
                                    </button>
                                ))}
                            </div>
                            <div className="px-4 py-2 text-xs font-bold text-slate-400 uppercase tracking-widest hidden md:block">
                                Sistemų grupavimas (AS-IS)
                            </div>
                        </header>

                        <div className="mb-8">
                            <h1 className="text-3xl font-black uppercase tracking-tighter text-slate-800">
                                {activeEntity} IT Sistemų grupavimas
                            </h1>
                            <p className="text-slate-500 text-sm font-medium">
                                {activeEntity === 'KSL' ? 'Kesko Senukai Lithuania' : 'Kesko Senukai Digital'}
                            </p>
                        </div>

                        <div className="space-y-12">
                            {currentInventory.map((item, idx) => (
                                <section key={idx} className="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                                    <div className={`${item.color} p-4 text-white flex items-center gap-3`}>
                                        <div className="p-2 bg-white/20 rounded-lg">
                                            <Icon name={item.icon} className="w-5 h-5" />
                                        </div>
                                        <h2 className="font-black uppercase text-sm tracking-wide">{item.domain}</h2>
                                    </div>
                                    
                                    <div className="p-0 overflow-x-auto">
                                        <table className="min-w-full border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50 border-b border-slate-200">
                                                    <th className="px-6 py-4 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest w-1/3">Sritis (Domenas)</th>
                                                    <th className="px-6 py-4 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest">Sistema</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {item.subdomains.map((sub, sidx) => (
                                                    <React.Fragment key={sidx}>
                                                        {sub.systems.map((sys, sysIdx) => (
                                                            <tr key={`${sidx}-${sysIdx}`} className="hover:bg-blue-50/20 transition-colors group">
                                                                <td className="px-6 py-3 align-top">
                                                                    <div className={`text-[11px] font-extrabold uppercase tracking-tight ${sysIdx === 0 ? 'text-slate-800' : 'text-slate-300'}`}>
                                                                        {sub.name}
                                                                    </div>
                                                                </td>
                                                                <td className="px-6 py-3">
                                                                    <div className="flex items-center gap-3">
                                                                        <div className={`w-1.5 h-1.5 rounded-full shrink-0 ${item.color} opacity-40 group-hover:opacity-100`}></div>
                                                                        <span className="text-xs font-bold text-slate-700 tracking-tight">{sys}</span>
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </React.Fragment>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </section>
                            ))}
                        </div>

                        <footer className="mt-16 text-center text-[10px] text-slate-300 font-bold uppercase tracking-[0.5em] py-8 border-t border-slate-100">
                            Kesko Senukai Architecture Group | AS-IS Mapping
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

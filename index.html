<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSL ir KSD IT sistemų Inventorizacija</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const Icon = ({ name, className }) => {
            const icons = {
                truck: <path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2m15-5V8a2 2 0 0 0-2-2h-3v10m4 0h2a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1h-2m-11 3a3 3 0 1 0 6 0 3 3 0 0 0-6 0m11 0a3 3 0 1 0 6 0 3 3 0 0 0-6 0" />,
                shopping: <path d="m5 11 4-7m10 7-4-7m-9 7h14m-12 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m10 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m-12-6 1.5 12h11l1.5-12" />,
                database: <path d="M12 22s8-2 8-10V6l-8-4-8 4v6c0 8 8 10 8 10" />,
                wallet: <path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1" />,
                globe: <React.Fragment><circle cx="12" cy="12" r="10" /><path d="M12 2a14.5 14.5 0 0 0 0 20M2 12h20" /></React.Fragment>,
                package: <path d="M16.5 9.4 7.5 4.21M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" />,
                list: <path d="M16 6h2a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h2M9 3h6a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1" />,
                layout: <React.Fragment><rect width="18" height="18" x="3" y="3" rx="2" /><path d="M3 9h18M9 21V9" /></React.Fragment>,
                zap: <path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z" />,
                layers: <path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.1 6.27a1 1 0 0 0 0 1.83l9.07 4.09a2 2 0 0 0 1.66 0l9.07-4.09a1 1 0 0 0 0-1.83ZM2.1 12.07l9.07 4.09a2 2 0 0 0 1.66 0l9.07-4.09M2.1 16.07l9.07 4.09a2 2 0 0 0-1.66 0l9.07-4.09" />,
                link: <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />,
                users: <React.Fragment><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></React.Fragment>,
                cpu: <React.Fragment><rect width="16" height="16" x="4" y="4" rx="2"/><path d="M9 9h6v6H9zM9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 15h3M1 9h3M1 15h3"/></React.Fragment>,
                lock: <path d="M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2zM7 11V7a5 5 0 0 1 10 0v4" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [activeEntity, setActiveEntity] = useState('KSL');

            const SECRET_CODE = "1234";

            const handleLogin = (e) => {
                e.preventDefault();
                if (password === SECRET_CODE) {
                    setIsAuthenticated(true);
                    setError('');
                } else {
                    setError('Bandykite dar kartą.');
                    setPassword('');
                }
            };

            const mapSystems = (list, defaultTeam = "") => list.map(item => {
                if (typeof item === 'string') return { name: item, relations: "", comment: "", teamSize: "", itTeam: defaultTeam };
                return { 
                    name: item.name, 
                    relations: item.relations || "",
                    comment: item.comment || "",
                    teamSize: item.teamSize || "",
                    itTeam: item.itTeam || defaultTeam
                };
            });

            // Pilnas KSLT atstatymas iš visos istorijos
            const kslInventory = [
                {
                    domain: "IT SUPPLYCHAIN (Tiekimas & Produktai)",
                    color: "bg-blue-600",
                    icon: "truck",
                    subdomains: [
                        { name: "PIM & Duomenų sodrinimas", systems: mapSystems([
                            { name: "Aikido (PIM)", relations: "Iš ERP; Publikuoja į Yolandi", comment: "Retail Data Entry; sodrinimas per AI" },
                            { name: "AX Prekių kortelės", relations: "Pakeičia Rivilę", comment: "ERP Master Data branduolys" },
                            { name: "Mentum.ai", relations: "Į Aikido", comment: "Turinio generavimas" },
                            { name: "Google Gemini", relations: "Į Aikido", comment: "Vertimai ir AI turinys" },
                            { name: "Rich content providers", relations: "Į Aikido", comment: "Flixmedia, Videoly duomenys" },
                            "Instrukcijų sistema", "Prekių ženklinimo lipdukų sistema"
                        ], "IT SUPPLYCHAIN") },
                        { name: "Kainų valdymas", systems: mapSystems([
                            { name: "GREP", relations: "Iš PriceIndex; į Yolandi", comment: "Kainų valdymas; URMAS B2B lojalumas" },
                            { name: "AX Pardavimų kainodara", relations: "Iš GREP", comment: "Bazinės kainos" },
                            { name: "Price comparison providers", relations: "Feed'ai į GREP", comment: "PriceIndex, Kaina24.lt" }
                        ], "IT SUPPLYCHAIN") }
                    ]
                },
                {
                    domain: "LOGISTIKA & OPERACIJOS",
                    color: "bg-indigo-600",
                    icon: "package",
                    subdomains: [
                        { name: "Užsakymų vykdymas", systems: mapSystems([
                            { name: "Yolandi (Homebrew ERP)", relations: "Orkestruoja užsakymus šalyse", comment: "Commerce, Order Mgmt, Operations" },
                            { name: "Cerberus", relations: "Iš Yolandi", comment: "Parduotuvių darbuotojų įrankis" },
                            { name: "OMS", relations: "Integracija su Yolandi", comment: "Orkestravimas" },
                            { name: "3PL / Courier services", relations: "Per Yolandi", comment: "Pristatymo valdymas" }
                        ], "IT SUPPLYCHAIN") }
                    ]
                },
                {
                    domain: "IT SHOP & PARDAVIMAI",
                    color: "bg-orange-600",
                    icon: "globe",
                    subdomains: [
                        { name: "Mažmenos sistemos", systems: mapSystems([
                            { name: "[KSLT] POS", relations: "Callbacks į Yolandi", comment: "Pardavimo taškai" }
                        ], "IT SHOP") }
                    ]
                },
                {
                    domain: "IT SUPPORT (Finansai & CRM)",
                    color: "bg-slate-700",
                    icon: "wallet",
                    subdomains: [
                        { name: "Finansai & Apskaita", systems: mapSystems([
                            { name: "BillGates", relations: "Bankai <-> Yolandi", comment: "Payment gateway" },
                            { name: "Salesforce Service Cloud", relations: "Iš Yolandi", comment: "Customer support CRM" },
                            { name: "Loyalty (Middleware)", relations: "KSLT <-> Zinrelo", comment: "Lojalumo integracijos" },
                            { name: "[KSLT] Loyalty (Rivilė)", relations: "Iš Elfas", comment: "Senas taškų modulis" }
                        ], "IT SUPPORT") }
                    ]
                }
            ];

            // Pilnas KSD atstatymas iš visos istorijos
            const ksdInventory = [
                {
                    domain: "KSD SALES & EXPERIENCE",
                    color: "bg-cyan-600",
                    icon: "layout",
                    subdomains: [
                        { name: "Pardavimų kanalai", systems: mapSystems([
                            { name: "Elfas", relations: "Backend visiems kanalams", comment: "Central sales channel" },
                            { name: "Sales Frontend (CX)", relations: "Per Digital Hub -> Elfas", comment: "Vartotojo sąsaja (Nauja)" },
                            { name: "iOS / Android Apps", relations: "Per Elfas API", comment: "Mobiliosios programėlės" }
                        ], "IT KSD / DIGITAL") },
                        { name: "Svetainės įrankiai", systems: mapSystems([
                            "SearchNode (Paieška)", "BitRec (Rekomendacijos)", "ip2location (Geolokacija)"
                        ], "IT KSD / DIGITAL") }
                    ]
                },
                {
                    domain: "KSD COMMERCE CORE",
                    color: "bg-purple-600",
                    icon: "zap",
                    subdomains: [
                        { name: "Šerdis & Turinys", systems: mapSystems([
                            { name: "ElasticPath", relations: "Komercijos variklis", comment: "Commerce Engine" },
                            { name: "Akeneo (PIM)", relations: "Iš AX ERP", comment: "Prekių info valdymas" },
                            { name: "Contentful (CMS)", relations: "Iš Cloudinary", comment: "Marketing Managers įrankis" },
                            "Cloudinary (DAM)"
                        ], "IT KSD / DIGITAL") }
                    ]
                },
                {
                    domain: "KSD MARKETING & LOYALTY",
                    color: "bg-amber-600",
                    icon: "users",
                    subdomains: [
                        { name: "Klientas & Rinkodara", systems: mapSystems([
                            { name: "Zinrelo", relations: "Sinchronizacija su SF", comment: "Lojalumo platforma" },
                            { name: "Salesforce Marketing Cloud", relations: "Sutikimų sinchronizacija", comment: "Email marketing" },
                            { name: "Lead generation", relations: "Feed'ai į Elfą", comment: "Kaina24.lt ir kt." }
                        ], "IT KSD / DIGITAL") }
                    ]
                },
                {
                    domain: "KSD INTEGRATION",
                    color: "bg-orange-500",
                    icon: "zap",
                    subdomains: [
                        { name: "Middleware", systems: mapSystems([
                            { name: "Digital Hub (Mulesoft)", relations: "Tiltas KSD <-> Šalių ERP", comment: "API magistralė" }
                        ], "IT KSD / DIGITAL") }
                    ]
                }
            ];

            // KSLV / KSEE atstatymas (SAP Cluster)
            const kslvInventory = [
                {
                    domain: "IT SUPPLYCHAIN (Tiekimas)",
                    color: "bg-blue-600",
                    icon: "truck",
                    subdomains: [
                        { name: "Pagrindinė ERP", systems: mapSystems([
                            { name: "SAP (Kesko Group ERP)", relations: "Sync su Yolandi", comment: "Assortment, Orders, Operations" },
                            { name: "IT Komanda", relations: "Reikia informacijos", comment: "" }
                        ], "Reikia informacijos") }
                    ]
                }
            ];

            const kseeInventory = [
                {
                    domain: "IT SUPPLYCHAIN (Tiekimas)",
                    color: "bg-blue-600",
                    icon: "truck",
                    subdomains: [
                        { name: "Pagrindinė ERP", systems: mapSystems([
                            { name: "SAP (Kesko Group ERP)", relations: "Sync su Yolandi", comment: "Assortment, Orders, Operations" },
                            { name: "IT Komanda", relations: "Reikia informacijos", comment: "" }
                        ], "Reikia informacijos") }
                    ]
                }
            ];

            const inventoryMap = { KSL: kslInventory, KSD: ksdInventory, KSLV: kslvInventory, KSEE: kseeInventory };
            const currentInventory = inventoryMap[activeEntity] || [];

            if (!isAuthenticated) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4">
                        <div className="max-w-sm w-full glass-effect p-8 rounded-3xl shadow-xl border border-white">
                            <div className="mb-6 text-center">
                                <div className="w-12 h-12 bg-blue-600 text-white rounded-xl flex items-center justify-center mx-auto mb-4 shadow-md">
                                    <Icon name="lock" className="w-6 h-6" />
                                </div>
                                <h1 className="text-xl font-black text-slate-800 uppercase tracking-tighter">Prieiga</h1>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input 
                                    type="password" 
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    placeholder="Kodas"
                                    className="w-full px-5 py-3 bg-slate-50 border-2 border-slate-200 rounded-xl focus:border-blue-500 focus:outline-none transition-all font-bold text-center tracking-widest"
                                    autoFocus
                                />
                                {error && <p className="text-red-500 text-[10px] font-bold text-center uppercase tracking-wide">{error}</p>}
                                <button 
                                    type="submit"
                                    className="w-full bg-blue-600 text-white py-3 rounded-xl font-black uppercase tracking-widest hover:bg-blue-700 shadow-md transition-all active:scale-95 text-sm"
                                >
                                    Prisijungti
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-[1700px] mx-auto">
                        <header className="mb-8 bg-white p-2 rounded-2xl shadow-sm border border-slate-200 flex flex-wrap items-center justify-between">
                            <div className="flex gap-2">
                                {Object.keys(inventoryMap).map(entity => (
                                    <button
                                        key={entity}
                                        onClick={() => setActiveEntity(entity)}
                                        className={`px-6 py-2.5 rounded-xl font-black text-sm transition-all ${
                                            activeEntity === entity ? 'bg-blue-600 text-white' : 'text-slate-400 hover:bg-slate-100'
                                        }`}
                                    >
                                        {entity}
                                    </button>
                                ))}
                            </div>
                        </header>

                        <div className="mb-8 flex justify-between items-end">
                            <h1 className="text-3xl font-black uppercase tracking-tighter text-slate-800">
                                {activeEntity} Inventorizacija
                            </h1>
                            <button onClick={() => setIsAuthenticated(false)} className="text-[10px] font-black text-slate-300 uppercase hover:text-red-500">
                                Atsijungti
                            </button>
                        </div>

                        <div className="space-y-12">
                            {currentInventory.length > 0 ? currentInventory.map((item, idx) => (
                                <section key={idx} className="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
                                    <div className={`${item.color} p-4 text-white flex items-center gap-3`}>
                                        <Icon name={item.icon} className="w-5 h-5" />
                                        <h2 className="font-black uppercase text-sm tracking-wide">{item.domain}</h2>
                                    </div>
                                    <div className="p-0 overflow-x-auto">
                                        <table className="min-w-full border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50 border-b border-slate-200">
                                                    <th className="px-4 py-4 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest w-[14%]">Sritis</th>
                                                    <th className="px-4 py-4 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest w-[14%]">Sistema</th>
                                                    <th className="px-4 py-4 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest w-[14%] text-center">IT Komanda</th>
                                                    <th className="px-4 py-4 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest w-[8%] text-center">Dydis</th>
                                                    <th className="px-4 py-4 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest w-[18%]">Ryšiai</th>
                                                    <th className="px-4 py-4 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest">Komentaras</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {item.subdomains.map((sub, sidx) => (
                                                    <React.Fragment key={sidx}>
                                                        {sub.systems.map((sysObj, sysIdx) => (
                                                            <tr key={`${sidx}-${sysIdx}`} className="hover:bg-blue-50/20 transition-colors">
                                                                <td className="px-4 py-3 align-top text-[10px] font-extrabold uppercase text-slate-800">{sysIdx === 0 ? sub.name : ''}</td>
                                                                <td className="px-4 py-3 align-top text-[11px] font-bold text-slate-700">
                                                                    <span className={sysObj.name === 'Reikia informacijos' ? 'text-red-600 font-black italic underline' : ''}>
                                                                        {sysObj.name}
                                                                    </span>
                                                                </td>
                                                                <td className="px-4 py-3 align-top text-center">
                                                                    <div className={`inline-flex items-center gap-1.5 px-2 py-0.5 rounded text-[9px] font-black border uppercase ${sysObj.itTeam === 'Reikia informacijos' ? 'bg-red-50 text-red-600 border-red-200 italic underline' : 'bg-slate-50 text-slate-500 border-slate-200'}`}>
                                                                        <Icon name="cpu" className="w-2.5 h-2.5" />
                                                                        {sysObj.itTeam || "—"}
                                                                    </div>
                                                                </td>
                                                                <td className="px-4 py-3 align-top text-center text-[10px] font-black text-slate-500">{sysObj.teamSize || "—"}</td>
                                                                <td className="px-4 py-3 align-top">
                                                                    <div className="flex items-center gap-1.5 text-[10px] text-blue-600 font-bold bg-blue-50/40 p-1 rounded border border-blue-100">
                                                                        {sysObj.relations || ""}
                                                                    </div>
                                                                </td>
                                                                <td className="px-4 py-3 align-top text-[10px] text-slate-500 italic">{sysObj.comment || ""}</td>
                                                            </tr>
                                                        ))}
                                                    </React.Fragment>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </section>
                            )) : (
                                <div className="py-20 text-center bg-white rounded-2xl border-2 border-dashed border-red-200 uppercase text-[10px] font-black text-red-400 tracking-widest">
                                    Reikia informacijos
                                </div>
                            )}
                        </div>

                        <footer className="mt-16 text-center text-[10px] text-slate-300 font-bold uppercase tracking-[0.5em] py-8 border-t border-slate-100">
                            Kesko Senukai Architecture Group
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

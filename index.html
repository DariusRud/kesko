<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSL ir KSD IT sistemų Inventorizacija</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const Icon = ({ name, className }) => {
            const icons = {
                truck: <path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2m15-5V8a2 2 0 0 0-2-2h-3v10m4 0h2a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1h-2m-11 3a3 3 0 1 0 6 0 3 3 0 0 0-6 0m11 0a3 3 0 1 0 6 0 3 3 0 0 0-6 0" />,
                shopping: <path d="m5 11 4-7m10 7-4-7m-9 7h14m-12 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m10 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4m-12-6 1.5 12h11l1.5-12" />,
                database: <path d="M12 22s8-2 8-10V6l-8-4-8 4v6c0 8 8 10 8 10" />,
                wallet: <path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1" />,
                globe: <React.Fragment><circle cx="12" cy="12" r="10" /><path d="M12 2a14.5 14.5 0 0 0 0 20M2 12h20" /></React.Fragment>,
                package: <path d="M16.5 9.4 7.5 4.21M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" />,
                list: <path d="M16 6h2a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h2M9 3h6a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1" />,
                layout: <React.Fragment><rect width="18" height="18" x="3" y="3" rx="2" /><path d="M3 9h18M9 21V9" /></React.Fragment>,
                zap: <path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z" />,
                layers: <path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.1 6.27a1 1 0 0 0 0 1.83l9.07 4.09a2 2 0 0 0 1.66 0l9.07-4.09a1 1 0 0 0 0-1.83ZM2.1 12.07l9.07 4.09a2 2 0 0 0 1.66 0l9.07-4.09M2.1 16.07l9.07 4.09a2 2 0 0 0-1.66 0l9.07-4.09" />,
                link: <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [activeEntity, setActiveEntity] = useState('KSL');

            const mapSystems = (list) => list.map(item => {
                if (typeof item === 'string') return { name: item, relations: "", comment: "" };
                return { 
                    name: item.name, 
                    relations: item.relations || "",
                    comment: item.comment || item.comment_only || "" 
                };
            });

            // KSL - Lietuva
            const kslInventory = [
                {
                    domain: "IT SUPPLYCHAIN (Tiekimas)",
                    color: "bg-blue-600",
                    icon: "truck",
                    subdomains: [
                        { name: "Prekių kortelės (normatyvai)", systems: mapSystems([
                            { name: "AX Prekių kortelės", relations: "Šaltinis PIM sistemai", comment: "Pagrindinė ERP dalis" },
                            "Instrukcijų sistema", 
                            "Prekių ženklinimo lipdukų sistema", 
                            "AX sertifikatai", 
                            "Sertifikatų programa", 
                            "AX Atlas", 
                            "Aikido integracija"
                        ]) },
                        { name: "Asortimento valdymas", systems: mapSystems(["AVS"]) },
                        { name: "Tiekėjai, sutartys", systems: mapSystems(["AX Tiekėjų kortelės", "AX Tiekėjų sutarčių valdymas", "SSK: Tiekimo sutarčių sąlygų sekimo ir nuolaidų kontrolės programa"]) },
                        { name: "Prekių tiekimas", systems: mapSystems(["Cross-docking", "KANBAN", "AX Pirkimų užsakymai", "AX Perkėlimo užsakymai", "Tiekimo ataskaitos"]) },
                        { name: "Prekių tiekimas (kokybės valdymas)", systems: mapSystems(["AX garantinio sistema", "Garantinio sistema (GRP)", "Pažeidimų sistema", "Pretenzijų sistema"]) },
                        { name: "Atsargų valdymas", systems: mapSystems(["AX Atsargų valdymas", "AX Atsargų inventorizacija", "Gamyba (fasavimas)", "GPAIS", "Sen2004 Sezoniniai požymiai"]) }
                    ]
                },
                {
                    domain: "LOGISTIKA (Transportas & Sandėliai)",
                    color: "bg-indigo-600",
                    icon: "package",
                    subdomains: [
                        { name: "Sandėlių valdymas", systems: mapSystems(["Sandėlių valdymo sistemos (SVS JDA)", "3PL SVS ir integracijos", "Aikštelių valdymo sistema (AVP)", "Krovinių valdymo sistema (KVP)", "AX Krovinių valdymo sistema", "Kiemo valdymo sistema (Fleet Complet)"]) },
                        { name: "Logistika (transportas)", systems: mapSystems(["Transporto maršrutizavimo sistema (TMS)", "Transporto valdymo sistema (Logixis)", "TSVS konkursavimo programa", "DPD lipdukų spausdinimo aplikacija", "KSL Kurjerių valdymo sistema", "IVAZ"]) }
                    ]
                },
                {
                    domain: "IT HOSALES (B2B & Pardavimai)",
                    color: "bg-green-600",
                    icon: "shopping",
                    subdomains: [
                        { name: "Klientai, sutartys, kreditai", systems: mapSystems(["AX Klientų kortelės", "AX Klientų sutartys", "AX Klientų kreditai"]) },
                        { name: "B2B pardavimai - urmas", systems: mapSystems([
                            { name: "AX Pardavimų modulis", relations: "Gauna užsakymus iš KSD OMS", comment: "B2B šerdis" },
                            "AX Tiesioginis pristatymas", 
                            "ESF (Elektroninių sąskaitų faktūrų) programa", 
                            "Komercinių pasiūlymų sistema (KOMPAS)", 
                            "EDI Pardavimai", 
                            "CRM", 
                            "Spec. užsakymai", 
                            "SABIS", 
                            "CommerceAPI"
                        ]) },
                        { name: "Pardavimai franšizėms", systems: mapSystems(["FP Rivilė", "PUPI (prekių užsakymas per internetą) programa", "Firminių prekių užsakymų valdymo programa (FPAU)"]) },
                        { name: "Pardavimai Eshop / LV / EE", systems: mapSystems(["AX Pardavimų modulis (Eshop)", { name: "Integracija su KSD www.e-senukai.lt", relations: "Per Digital Hub", comment: "" }, "AX Pardavimų modulis (LV/EE)"]) },
                        { name: "Kainodara / Akcijos / Lojalumas", systems: mapSystems(["AX LT Pardavimų kainodaros valdymas", "AX Akcijų valdymas", "AX Pardavimų grąžinimai", "Rivilė: Lojalumo modulis", "AX Lojalumo modulis", "Dovanų kortelės"]) }
                    ]
                }
            ];

            // KSD - Digital
            const ksdInventory = [
                {
                    domain: "KSD SUPPLYCHAIN (Tiekimo grandinė)",
                    color: "bg-blue-600",
                    icon: "truck",
                    subdomains: [
                        { name: "Prekių duomenų valdymas", systems: mapSystems([
                            { name: "PIM", relations: "Iš AX ERP (KSL/LV/EE)", comment: "Prekių info Master" },
                            { name: "DAM", relations: "Iš Contentful", comment: "Nuotraukų saugykla" }
                        ]) }
                    ]
                },
                {
                    domain: "KSD SALES (Pardavimai / Klientas)",
                    color: "bg-green-600",
                    icon: "shopping",
                    subdomains: [
                        { name: "E-commerce platforma", systems: mapSystems([
                            { name: "Next.js Web Platform", relations: "Per Digital Hub API", comment: "Frontend" },
                            { name: "Contentful (CMS)", relations: "Integruota su DAM", comment: "Turinys" }
                        ]) },
                        { name: "Kliento duomenys ir Lojalumas", systems: mapSystems([
                            { name: "Customer Hub", relations: "Per Digital Hub", comment: "Vieningas kliento profilis" },
                            { name: "Lojalumo sistema (Loyalty)", relations: "Integruota su Hub", comment: "Skaitmeninis lojalumas" }
                        ]) },
                        { name: "Analitika", systems: mapSystems(["Google Analytics", "Hotjar", "GTM"]) }
                    ]
                },
                {
                    domain: "KSD OPERATIONS (Užsakymai & Vykdymas)",
                    color: "bg-emerald-600",
                    icon: "package",
                    subdomains: [
                        { name: "Užsakymų valdymas", systems: mapSystems([
                            { name: "OMS", relations: "Į Elfas ir Šalių AX ERP", comment: "Orkestravimas" },
                            { name: "Elfas", relations: "Užsakymų vykdymas", comment: "Kontrolė" }
                        ]) }
                    ]
                },
                {
                    domain: "KSD INTEGRATION (Integracija)",
                    color: "bg-amber-600",
                    icon: "zap",
                    subdomains: [
                        { name: "Middleware sluoksnis", systems: mapSystems([
                            { name: "Digital Hub", relations: "Tiltas KSD <-> KSL/LV/EE", comment: "Centrinis API Gateway" }
                        ]) }
                    ]
                }
            ];

            // KSLV - Latvija
            const kslvInventory = [
                {
                    domain: "IT SUPPLYCHAIN (Tiekimas)",
                    color: "bg-blue-600",
                    icon: "truck",
                    subdomains: [
                        { name: "Prekių valdymas", systems: mapSystems([
                            { name: "AX ERP LV", relations: "Shared Core su KSL", comment: "Tiekimo grandinės valdymas" },
                            "Vietinės instrukcijos LV"
                        ]) }
                    ]
                },
                {
                    domain: "LOGISTIKA (Sandėliai / Pristatymas)",
                    color: "bg-indigo-600",
                    icon: "package",
                    subdomains: [
                        { name: "Sandėlių valdymas", systems: mapSystems(["AX Inventory LV", "Vietinės integracijos LV"]) },
                        { name: "Pristatymas", systems: mapSystems(["Omniva LV", "Latvijas Pasts", "Venipak LV"]) }
                    ]
                },
                {
                    domain: "IT SUPPORT (Finansai & HR)",
                    color: "bg-slate-700",
                    icon: "wallet",
                    subdomains: [
                        { name: "Finansai", systems: mapSystems([{ name: "AX Finansai LV", relations: "Local integrations", comment: "Mokesčiai ir apskaita" }]) }
                    ]
                }
            ];

            // KSEE - Estija
            const kseeInventory = [
                {
                    domain: "IT SUPPLYCHAIN (Tiekimas)",
                    color: "bg-blue-600",
                    icon: "truck",
                    subdomains: [
                        { name: "Prekių valdymas", systems: mapSystems([
                            { name: "AX ERP EE", relations: "Shared Core su KSL", comment: "K-Rauta specifika" }
                        ]) }
                    ]
                },
                {
                    domain: "LOGISTIKA (Sandėliai / Pristatymas)",
                    color: "bg-indigo-600",
                    icon: "package",
                    subdomains: [
                        { name: "Logistikos tinklas", systems: mapSystems(["Omniva EE", "SmartPost Itella", "DPD EE"]) }
                    ]
                },
                {
                    domain: "IT SUPPORT (Finansai & HR)",
                    color: "bg-slate-700",
                    icon: "wallet",
                    subdomains: [
                        { name: "Finansai", systems: mapSystems([{ name: "AX Finansai EE", relations: "Local integrations", comment: "E-invoice integracijos" }]) }
                    ]
                }
            ];

            const inventoryMap = {
                KSL: kslInventory,
                KSD: ksdInventory,
                KSLV: kslvInventory,
                KSEE: kseeInventory
            };

            const currentInventory = inventoryMap[activeEntity] || [];

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-7xl mx-auto">
                        <header className="mb-8 bg-white p-2 rounded-2xl shadow-sm border border-slate-200 flex flex-wrap items-center justify-between">
                            <div className="flex gap-2">
                                {Object.keys(inventoryMap).map(entity => (
                                    <button
                                        key={entity}
                                        onClick={() => setActiveEntity(entity)}
                                        className={`px-6 py-2.5 rounded-xl font-black text-sm transition-all ${
                                            activeEntity === entity 
                                            ? 'bg-blue-600 text-white shadow-md shadow-blue-200' 
                                            : 'text-slate-400 hover:bg-slate-100'
                                        }`}
                                    >
                                        {entity}
                                    </button>
                                ))}
                            </div>
                            <div className="px-4 py-2 text-xs font-bold text-slate-400 uppercase tracking-widest hidden md:block">
                                IT Sistemų Inventorizacija (AS-IS)
                            </div>
                        </header>

                        <div className="mb-8">
                            <h1 className="text-3xl font-black uppercase tracking-tighter text-slate-800">
                                {activeEntity} IT Sistemų Inventorizacija
                            </h1>
                            <p className="text-slate-500 text-sm font-medium italic">
                                {activeEntity === 'KSL' && 'Kesko Senukai Lithuania'}
                                {activeEntity === 'KSD' && 'Kesko Senukai Digital'}
                                {activeEntity === 'KSLV' && 'Kesko Senukai Latvia'}
                                {activeEntity === 'KSEE' && 'Kesko Senukai Estonia (K-Rauta)'}
                            </p>
                        </div>

                        <div className="space-y-12">
                            {currentInventory.length > 0 ? currentInventory.map((item, idx) => (
                                <section key={idx} className="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
                                    <div className={`${item.color} p-4 text-white flex items-center gap-3`}>
                                        <div className="p-2 bg-white/20 rounded-lg">
                                            <Icon name={item.icon} className="w-5 h-5" />
                                        </div>
                                        <h2 className="font-black uppercase text-sm tracking-wide">{item.domain}</h2>
                                    </div>
                                    
                                    <div className="p-0 overflow-x-auto">
                                        <table className="min-w-full border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50 border-b border-slate-200">
                                                    <th className="px-6 py-4 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest w-[20%]">Sritis (Domenas)</th>
                                                    <th className="px-6 py-4 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest w-[20%]">Sistema</th>
                                                    <th className="px-6 py-4 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest w-[25%]">Ryšiai (Integracijos)</th>
                                                    <th className="px-6 py-4 text-left text-[10px] font-black text-slate-400 uppercase tracking-widest">Komentaras</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {item.subdomains.map((sub, sidx) => (
                                                    <React.Fragment key={sidx}>
                                                        {sub.systems.map((sysObj, sysIdx) => (
                                                            <tr key={`${sidx}-${sysIdx}`} className="hover:bg-blue-50/20 transition-colors group">
                                                                <td className="px-6 py-3 align-top">
                                                                    <div className={`text-[11px] font-extrabold uppercase tracking-tight ${sysIdx === 0 ? 'text-slate-800' : 'text-slate-300'}`}>
                                                                        {sub.name}
                                                                    </div>
                                                                </td>
                                                                <td className="px-6 py-3 align-top">
                                                                    <div className="flex items-center gap-3">
                                                                        <div className={`w-1.5 h-1.5 rounded-full shrink-0 ${item.color} opacity-40 group-hover:opacity-100`}></div>
                                                                        <span className="text-xs font-bold text-slate-700 tracking-tight">{sysObj.name}</span>
                                                                    </div>
                                                                </td>
                                                                <td className="px-6 py-3 align-top">
                                                                    <div className="flex items-center gap-2 text-[11px] text-blue-600 font-semibold bg-blue-50/50 p-1.5 rounded border border-blue-100 min-h-[1.5rem]">
                                                                        {sysObj.relations && <Icon name="link" className="w-3 h-3 shrink-0" />}
                                                                        {sysObj.relations || ""}
                                                                    </div>
                                                                </td>
                                                                <td className="px-6 py-3 align-top">
                                                                    <div className="text-[11px] text-slate-500 italic min-h-[1.25rem]">
                                                                        {sysObj.comment || ""}
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </React.Fragment>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </section>
                            )) : (
                                <div className="py-20 text-center bg-white rounded-2xl border-2 border-dashed border-slate-200">
                                    <p className="text-slate-400 font-bold uppercase tracking-widest text-xs">Informacija pildoma...</p>
                                </div>
                            )}
                        </div>

                        <footer className="mt-16 text-center text-[10px] text-slate-300 font-bold uppercase tracking-[0.5em] py-8 border-t border-slate-100">
                            Kesko Senukai Architecture Group | AS-IS Inventorizacija
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
